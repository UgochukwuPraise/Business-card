<html>

<head>
  <title>Business Card</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
  <section class="hero-container">
    <!--     Left Copy   -->
    <div class="hero-text">
      <h1>Get
        <span class="insights">insights</span> that helps your business grow
      </h1>

      <p class="hero-desc">Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency </p>

      <!--  stats content      -->
      <div class="hero-stat">
        <div>
          <h2 class=hero-number>10k+</h2>
          <p class="hero-label">Companies</p>
        </div>

        <div>
          <h2 class="hero-number">314</h2>
          <p class="hero-label">Templates</p>
        </div>

        <div>
          <h2 class="hero-number">12M</h2>
          <p class="hero-label">Queries</p>
        </div>

      </div>

    </div>

    <!--    Right Copy    -->
    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c" alt="A team team working together on laptops" />

    </div>

  </section>
</body>

</html>
